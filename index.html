<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería de Fotos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     CONFIGURACIÓN VISUAL
     ============================================================ */
  :root{
    --canvas:   #f3f5f1;
    --surface:  #ffffff;
    --ink:      #1a1d1a;
    --muted:    #6b7269;
    --line:     #e2e6df;
    --accent:   #2e6f4e;
    --accent-2: #245a3f;
    --danger:   #b4452e;
    --radius:   14px;
    --shadow:   0 1px 2px rgba(26,29,26,.04), 0 8px 24px rgba(26,29,26,.06);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--canvas);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  .wrap{ max-width:1140px; margin:0 auto; padding:0 20px; }

  /* ---------- Encabezado ---------- */
  header{
    padding:40px 0 28px;
    border-bottom:1px solid var(--line);
  }
  .brand{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(28px,5vw,42px);
    letter-spacing:-.01em;
    line-height:1;
  }
  .brand .dot{ color:var(--accent); }
  .tagline{ color:var(--muted); margin-top:8px; font-size:15px; }

  /* ---------- Tarjeta de subida ---------- */
  .uploader{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:22px;
    margin:28px 0 36px;
    box-shadow:var(--shadow);
  }
  .drop{
    border:2px dashed var(--line);
    border-radius:12px;
    padding:34px 20px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .drop:hover, .drop.drag{ border-color:var(--accent); background:#f4faf6; }
  .drop strong{ color:var(--accent); }
  .drop p{ color:var(--muted); font-size:14px; margin-top:6px; }
  .drop .icon{ font-size:30px; line-height:1; }
  input[type=file]{ display:none; }

  .field{ margin-top:16px; }
  .field label{ display:block; font-size:13px; font-weight:500; color:var(--muted); margin-bottom:6px; }
  .field input[type=text]{
    width:100%;
    padding:11px 13px;
    border:1px solid var(--line);
    border-radius:10px;
    font:inherit;
    color:var(--ink);
    background:var(--canvas);
  }
  .field input:focus{ outline:2px solid var(--accent); outline-offset:1px; border-color:transparent; }

  .row{ display:flex; align-items:center; gap:14px; margin-top:18px; flex-wrap:wrap; }
  button.primary{
    font:inherit; font-weight:600;
    background:var(--accent); color:#fff;
    border:none; border-radius:10px;
    padding:11px 22px; cursor:pointer;
    transition:background .15s, transform .05s;
  }
  button.primary:hover{ background:var(--accent-2); }
  button.primary:active{ transform:translateY(1px); }
  button.primary:disabled{ background:#a9b3ab; cursor:default; }
  .status{ font-size:14px; color:var(--muted); }
  .status.err{ color:var(--danger); }

  .queue{ list-style:none; margin-top:14px; display:flex; flex-direction:column; gap:8px; }
  .queue li{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    font-size:13px; padding:8px 12px; background:var(--canvas);
    border:1px solid var(--line); border-radius:9px;
  }
  .queue .tag{ font-weight:500; }
  .queue .ok{ color:var(--accent); }
  .queue .bad{ color:var(--danger); }

  /* ---------- Galería ---------- */
  .gallery-head{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:18px; gap:12px; flex-wrap:wrap;
  }
  .gallery-head h2{ font-family:'Fraunces',serif; font-weight:600; font-size:22px; }
  .count{ color:var(--muted); font-size:14px; }

  .grid{ column-count:4; column-gap:16px; }
  @media (max-width:980px){ .grid{ column-count:3; } }
  @media (max-width:680px){ .grid{ column-count:2; } }
  @media (max-width:420px){ .grid{ column-count:1; } }

  .card{
    break-inside:avoid;
    margin-bottom:16px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
    box-shadow:var(--shadow);
    cursor:zoom-in;
    transition:transform .15s, box-shadow .15s;
  }
  .card:hover{ transform:translateY(-2px); box-shadow:0 10px 30px rgba(26,29,26,.12); }
  .card img{ width:100%; display:block; background:#eef0ec; }
  .card .meta{ padding:11px 13px 13px; }
  .card .meta .name{ font-weight:600; font-size:14px; word-break:break-word; }
  .card .meta .desc{ color:var(--muted); font-size:13px; margin-top:3px; word-break:break-word; }
  .card .meta .date{ color:var(--muted); font-size:11.5px; margin-top:7px; }

  .empty, .loading{
    text-align:center; color:var(--muted);
    padding:60px 20px; font-size:15px;
    border:1px dashed var(--line); border-radius:var(--radius);
  }

  /* ---------- Lightbox ---------- */
  .lightbox{
    position:fixed; inset:0; z-index:50;
    background:rgba(13,15,13,.92);
    display:none; align-items:center; justify-content:center;
    padding:24px;
  }
  .lightbox.open{ display:flex; }
  .lightbox img{ max-width:100%; max-height:82vh; border-radius:8px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
  .lightbox .cap{ position:absolute; bottom:18px; left:0; right:0; text-align:center; color:#e8ebe6; font-size:14px; padding:0 24px; }
  .lightbox .close{
    position:absolute; top:18px; right:22px;
    background:none; border:none; color:#fff;
    font-size:34px; line-height:1; cursor:pointer; opacity:.8;
  }
  .lightbox .close:hover{ opacity:1; }

  footer{ color:var(--muted); font-size:12.5px; text-align:center; padding:36px 0 30px; }

  @media (prefers-reduced-motion:reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="brand">Galería<span class="dot">.</span></div>
    <p class="tagline">Sube tus fotos y velas al instante. Almacenadas en Drive, registradas en tu hoja de cálculo.</p>
  </div>
</header>

<main class="wrap">

  <!-- ====== SUBIR ====== -->
  <section class="uploader">
    <label class="drop" id="drop">
      <div class="icon">↑</div>
      <div><strong>Elige fotos</strong> o arrástralas aquí</div>
      <p>JPG, PNG o WEBP — puedes seleccionar varias a la vez</p>
      <input type="file" id="file" accept="image/*" multiple>
    </label>

    <div class="field">
      <label for="desc">Descripción (opcional, se aplica a esta carga)</label>
      <input type="text" id="desc" placeholder="Ej.: Inspección bodega — junio">
    </div>

    <div class="row">
      <button class="primary" id="btn" disabled>Subir fotos</button>
      <span class="status" id="status">Aún no has elegido fotos.</span>
    </div>

    <ul class="queue" id="queue"></ul>
  </section>

  <!-- ====== GALERÍA ====== -->
  <section>
    <div class="gallery-head">
      <h2>Tus fotos</h2>
      <span class="count" id="count"></span>
    </div>
    <div id="galleryHost">
      <div class="loading" id="loading">Cargando fotos…</div>
      <div class="grid" id="grid" style="display:none"></div>
    </div>
  </section>

</main>

<footer class="wrap">Galería de fotos · GitHub Pages + Google Apps Script</footer>

<!-- ====== LIGHTBOX ====== -->
<div class="lightbox" id="lightbox">
  <button class="close" id="lbClose" aria-label="Cerrar">×</button>
  <img id="lbImg" alt="">
  <div class="cap" id="lbCap"></div>
</div>

<script>
/* ============================================================
   CONFIGURACIÓN  —  pega aquí la URL de tu Web App de Apps Script
   (Implementar > Nueva implementación > Aplicación web)
   ============================================================ */
const API_URL = 'PEGA_AQUI_LA_URL_DE_TU_WEB_APP';

const MAX_LADO = 1600;   // px: redimensiona la foto antes de subir
const CALIDAD  = 0.85;   // calidad JPEG (0–1)

const $ = (id) => document.getElementById(id);
let archivos = [];

/* ---------- Selección de archivos ---------- */
const drop = $('drop'), file = $('file');
file.addEventListener('change', () => setArchivos(file.files));

['dragover','dragenter'].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('drag'); }));
['dragleave','drop'].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('drag'); }));
drop.addEventListener('drop', e => setArchivos(e.dataTransfer.files));

function setArchivos(lista){
  archivos = Array.from(lista).filter(f => f.type.startsWith('image/'));
  $('btn').disabled = archivos.length === 0;
  $('status').className = 'status';
  $('status').textContent = archivos.length
    ? `${archivos.length} foto(s) lista(s) para subir.`
    : 'Aún no has elegido fotos.';
  $('queue').innerHTML = '';
}

/* ---------- Comprimir / redimensionar ---------- */
function procesar(f){
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      let { width:w, height:h } = img;
      if (w > MAX_LADO || h > MAX_LADO){
        const r = Math.min(MAX_LADO/w, MAX_LADO/h);
        w = Math.round(w*r); h = Math.round(h*r);
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = c.toDataURL('image/jpeg', CALIDAD);
      res(dataUrl.split(',')[1]); // solo el base64
    };
    img.onerror = rej;
    img.src = URL.createObjectURL(f);
  });
}

/* ---------- Subir ---------- */
$('btn').addEventListener('click', async () => {
  if (!archivos.length) return;
  if (API_URL.startsWith('PEGA_AQUI')){
    setError('Falta configurar API_URL en el HTML con la URL de tu Web App.');
    return;
  }

  $('btn').disabled = true;
  const desc = $('desc').value.trim();
  const q = $('queue'); q.innerHTML = '';
  let exitos = 0;

  for (const f of archivos){
    const li = document.createElement('li');
    li.innerHTML = `<span class="tag">${f.name}</span><span class="state">Procesando…</span>`;
    q.appendChild(li);
    const estado = li.querySelector('.state');

    try{
      const base64 = await procesar(f);
      estado.textContent = 'Subiendo…';
      const r = await fetch(API_URL, {
        method: 'POST',
        // Sin Content-Type personalizado: el navegador usa text/plain
        // y así NO se dispara el preflight (OPTIONS) que rompe el CORS de Apps Script.
        body: JSON.stringify({
          nombre: f.name.replace(/\.[^.]+$/, '') + '.jpg',
          mimeType: 'image/jpeg',
          base64: base64,
          descripcion: desc
        })
      });
      const data = await r.json();
      if (!data.ok) throw new Error(data.error || 'Error del servidor');
      estado.textContent = '✓ Subida'; estado.className = 'state ok';
      exitos++;
    }catch(err){
      estado.textContent = '✗ ' + (err.message || 'Error'); estado.className = 'state bad';
    }
  }

  $('status').className = 'status';
  $('status').textContent = `${exitos} de ${archivos.length} foto(s) subida(s).`;
  $('desc').value = '';
  archivos = []; file.value = '';
  $('btn').disabled = true;
  cargarGaleria();
});

/* ---------- Cargar galería ---------- */
async function cargarGaleria(){
  $('loading').style.display = '';
  $('loading').textContent = 'Cargando fotos…';
  $('grid').style.display = 'none';

  if (API_URL.startsWith('PEGA_AQUI')){
    $('loading').textContent = 'Configura API_URL en el HTML para ver tus fotos.';
    return;
  }

  try{
    const r = await fetch(API_URL + '?action=list');
    const data = await r.json();
    if (!data.ok) throw new Error(data.error);
    render(data.fotos || []);
  }catch(err){
    $('loading').textContent = 'No se pudo cargar la galería: ' + err.message;
  }
}

function render(fotos){
  const grid = $('grid');
  $('count').textContent = fotos.length ? `${fotos.length} foto(s)` : '';
  grid.innerHTML = '';

  if (!fotos.length){
    $('loading').style.display = '';
    $('loading').className = 'empty';
    $('loading').textContent = 'Todavía no hay fotos. Sube la primera arriba.';
    return;
  }

  $('loading').style.display = 'none';
  grid.style.display = '';

  fotos.forEach(ft => {
    const card = document.createElement('div');
    card.className = 'card';
    const fecha = ft.fecha ? new Date(ft.fecha).toLocaleString('es-EC',
      { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
    card.innerHTML = `
      <img loading="lazy" src="${ft.url}" alt="${(ft.nombre||'Foto')}"
           onerror="this.style.opacity=.4;this.alt='No se pudo cargar';">
      <div class="meta">
        <div class="name">${ft.nombre || 'Sin nombre'}</div>
        ${ft.descripcion ? `<div class="desc">${ft.descripcion}</div>` : ''}
        <div class="date">${fecha}</div>
      </div>`;
    card.addEventListener('click', () => abrirLightbox(ft));
    grid.appendChild(card);
  });
}

/* ---------- Lightbox ---------- */
const lb = $('lightbox');
function abrirLightbox(ft){
  $('lbImg').src = ft.url;
  $('lbImg').alt = ft.nombre || '';
  $('lbCap').textContent = [ft.nombre, ft.descripcion].filter(Boolean).join(' — ');
  lb.classList.add('open');
}
function cerrar(){ lb.classList.remove('open'); $('lbImg').src = ''; }
$('lbClose').addEventListener('click', cerrar);
lb.addEventListener('click', e => { if (e.target === lb) cerrar(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrar(); });

function setError(msg){
  $('status').className = 'status err';
  $('status').textContent = msg;
}

/* ---------- Inicio ---------- */
cargarGaleria();
</script>
</body>
</html>
